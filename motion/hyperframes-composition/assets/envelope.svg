<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Envelope body -->
  <rect x="10" y="30" width="180" height="100" rx="8" fill="#FFFDF8" stroke="#D6A75E" stroke-width="2"/>
  <!-- Envelope flap -->
